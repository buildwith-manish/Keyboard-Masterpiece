# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Keyboard Masterpiece — Codemagic CI/CD Configuration
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# SETUP INSTRUCTIONS:
# 1. Go to https://codemagic.io/signup → Create account (free tier: 500 min/mo)
# 2. Click "Add application" → Select your GitHub repo "Keyboard-Masterpiece"
# 3. Select "Use codemagic.yaml" as configuration method
# 4. For SIGNED release builds: App Settings → Distribution → Android code signing
#    - Upload the keyboard_masterpiece.jks keystore file
#    - Enter keystore password, key alias, key password
# 5. Start a build!
#
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

workflows:
  # ─── Debug Build ───────────────────────────────────────────────────────
  android-debug:
    name: "Keyboard Masterpiece — Debug APK"
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      java: 17
      vars:
        GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "keyboard-android-production"
          include: true
        - pattern: "main"
          include: true
        - pattern: "develop"
          include: true
      cancel_previous_builds: true

    scripts:
      - name: Set up local properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "Android SDK: $ANDROID_SDK_ROOT"

      - name: Make Gradle wrapper executable
        script: chmod +x ./gradlew

      - name: Build Debug APK
        script: |
          set -e
          echo "🔨 Building Debug APK..."
          ./gradlew clean assembleDebug --no-daemon --stacktrace

      - name: List generated APK files
        script: |
          echo "📁 Scanning for APK files..."
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          echo ""
          echo "📁 Full build outputs:"
          ls -laR app/build/outputs/apk/ 2>/dev/null || echo "APK output directory not found"

    artifacts:
      - app/build/outputs/apk/debug/*.apk
      - app/build/outputs/apk/**/*.apk

    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true

  # ─── Release Build (Signed) ────────────────────────────────────────────
  android-release:
    name: "Keyboard Masterpiece — Signed Release APK"
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      java: 17
      groups:
        - keyboard_signing
      vars:
        GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false"

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: "keyboard-android-production"
          include: true
        - pattern: "main"
          include: true
      tag_patterns:
        - pattern: "v*"
          include: true
      cancel_previous_builds: true

    scripts:
      - name: Set up local properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "Android SDK: $ANDROID_SDK_ROOT"

      - name: Make Gradle wrapper executable
        script: chmod +x ./gradlew

      - name: Set up keystore from Codemagic environment
        script: |
          echo "🔐 Checking Android signing configuration..."
          if [ -n "$CM_KEYSTORE_PATH" ]; then
            echo "✅ Codemagic keystore found at: $CM_KEYSTORE_PATH"
            echo "Key alias: $CM_KEY_ALIAS"
          else
            echo "⚠️  No keystore configured — building unsigned release APK"
            echo "To get a signed APK, add your keystore in:"
            echo "  Codemagic Dashboard → App Settings → Distribution → Android code signing"
          fi

      - name: Build Release APK
        script: |
          set -e
          echo "🔨 Building Release APK..."
          ./gradlew clean assembleRelease --no-daemon --stacktrace

      - name: List generated APK files and verify signing
        script: |
          echo "📁 Scanning for APK files..."
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          echo ""
          echo "📁 Full build outputs:"
          ls -laR app/build/outputs/apk/ 2>/dev/null || echo "APK output directory not found"

          # Check for release APK
          RELEASE_APK=$(find app/build/outputs/apk/release -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$RELEASE_APK" ]; then
            echo ""
            echo "📦 Release APK found: $RELEASE_APK"
            APK_SIZE=$(du -h "$RELEASE_APK" | cut -f1)
            echo "📐 APK size: $APK_SIZE"

            # Verify signing
            if command -v jarsigner &> /dev/null; then
              VERIFY_RESULT=$(jarsigner -verify "$RELEASE_APK" 2>&1)
              echo "🔏 Signing status: $VERIFY_RESULT"
            fi

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  Keyboard Masterpiece Release Build"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  Version: 1.1.0 (Build $CM_BUILD_NUMBER)"
            echo "  Size:    $APK_SIZE"
            echo "  Signed:  $([ -n "$CM_KEYSTORE_PATH" ] && echo 'YES' || echo 'NO')"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          else
            echo "❌ No release APK found!"
          fi

    artifacts:
      - app/build/outputs/apk/release/*.apk
      - app/build/outputs/apk/**/*.apk
      - app/build/outputs/mapping/release/**

    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true

  # ─── Full Pipeline (Debug + Release) ───────────────────────────────────
  android-full-pipeline:
    name: "Keyboard Masterpiece — Full Pipeline"
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      java: 17
      groups:
        - keyboard_signing
      vars:
        GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "keyboard-android-production"
          include: true
      cancel_previous_builds: true

    scripts:
      - name: Set up local properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "Android SDK: $ANDROID_SDK_ROOT"

      - name: Make Gradle wrapper executable
        script: chmod +x ./gradlew

      - name: Run Lint checks
        script: |
          ./gradlew lint --no-daemon 2>&1 | tail -20 || true

      - name: Build Debug APK
        script: |
          set -e
          echo "🔨 Building Debug APK..."
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        script: |
          set -e
          echo "🔨 Building Release APK..."
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: List all generated APK files
        script: |
          echo "📁 All APK files found:"
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          echo ""
          echo "📁 Debug APKs:"
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug APKs"
          echo ""
          echo "📁 Release APKs:"
          ls -la app/build/outputs/apk/release/ 2>/dev/null || echo "No release APKs"

    artifacts:
      - app/build/outputs/apk/debug/*.apk
      - app/build/outputs/apk/release/*.apk
      - app/build/outputs/apk/**/*.apk
      - app/build/outputs/mapping/release/**

    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true
