# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Keyboard Masterpiece — Codemagic CI/CD Configuration
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# SETUP INSTRUCTIONS:
# 1. Go to https://codemagic.io/signup → Create account (free tier: 500 min/mo)
# 2. Click "Add application" → Select your GitHub repo "Keyboard-Masterpiece"
# 3. Go to app settings → Distribution → Android code signing
#    - Upload the keyboard_masterpiece.jks keystore file
#    - Enter keystore password: KM$tr0ng!K3y#2024
#    - Enter key alias: keyboard_masterpiece
#    - Enter key password: KM$tr0ng!K3y#2024
# 4. Codemagic will auto-inject CM_KEYSTORE_PATH, CM_KEYSTORE_PASSWORD,
#    CM_KEY_ALIAS, CM_KEY_PASSWORD as environment variables
# 5. Start a build! Both debug and signed release APKs will be generated.
#
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

workflows:
  # ─── Debug Build ───────────────────────────────────────────────────────
  android-debug:
    name: "Keyboard Masterpiece — Debug APK"
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      java: 17
      groups:
        - keyboard_signing   # Only needed if you want debug signed too
      vars:
        GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "keyboard-android-production"
          include: true
        - pattern: "main"
          include: true
        - pattern: "develop"
          include: true
      cancel_previous_builds: true

    scripts:
      - name: Set up local properties
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make Gradle wrapper executable
        script: chmod +x ./gradlew

      - name: Build Debug APK
        script: |
          echo "🔨 Building Debug APK..."
          ./gradlew clean assembleDebug --no-daemon --stacktrace --info 2>&1 | tail -50

    artifacts:
      - app/build/outputs/apk/debug/*.apk
      - app/build/reports/**

    publishing:
      email:
        recipients:
          - user@example.com   # ← Replace with your email
        notify:
          success: true
          failure: true

  # ─── Release Build (Signed) ────────────────────────────────────────────
  android-release:
    name: "Keyboard Masterpiece — Signed Release APK"
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      java: 17
      groups:
        - keyboard_signing   # ← Environment group with your keystore credentials
      vars:
        GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false"

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: "keyboard-android-production"
          include: true
        - pattern: "main"
          include: true
      tag_patterns:
        - pattern: "v*"
          include: true
      cancel_previous_builds: true

    scripts:
      - name: Set up local properties
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make Gradle wrapper executable
        script: chmod +x ./gradlew

      - name: Set up keystore from Codemagic environment
        script: |
          echo "🔐 Setting up Android signing..."
          if [ -n "$CM_KEYSTORE_PATH" ]; then
            echo "✅ Codemagic keystore found at: $CM_KEYSTORE_PATH"
            # The CM_KEYSTORE_PATH is already a file path provided by Codemagic
            # Our build.gradle.kts reads CM_KEYSTORE_PATH directly
            echo "Key alias: $CM_KEY_ALIAS"
          else
            echo "⚠️  No keystore configured — building unsigned release APK"
            echo "To get a signed APK, add your keystore in:"
            echo "  Codemagic Dashboard → App Settings → Distribution → Android code signing"
          fi

      - name: Build Release APK
        script: |
          echo "🔨 Building Release APK..."
          ./gradlew clean assembleRelease --no-daemon --stacktrace --info 2>&1 | tail -50

      - name: Verify APK signing
        script: |
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          if [ -f "$APK_PATH" ]; then
            echo "📦 APK built successfully: $APK_PATH"
            APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
            echo "📐 APK size: $APK_SIZE"

            # Check if APK is signed
            if command -v jarsigner &> /dev/null; then
              VERIFY_RESULT=$(jarsigner -verify "$APK_PATH" 2>&1)
              echo "🔏 Signing verification: $VERIFY_RESULT"
            fi

            # Print build info
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  Keyboard Masterpiece Build Summary"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  Version: 1.1.0 (Build $CM_BUILD_NUMBER)"
            echo "  Size:    $APK_SIZE"
            echo "  Signed:  $([ -n "$CM_KEYSTORE_PATH" ] && echo 'YES ✓' || echo 'NO ✗')"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          else
            echo "❌ APK not found at expected path"
            ls -la app/build/outputs/apk/release/ 2>/dev/null || echo "Release directory missing"
            exit 1
          fi

    artifacts:
      - app/build/outputs/apk/release/*.apk
      - app/build/outputs/mapping/release/**     # ProGuard mapping for crash analysis
      - app/build/reports/**                      # Lint & build reports

    publishing:
      email:
        recipients:
          - user@example.com   # ← Replace with your email
        notify:
          success: true
          failure: true

  # ─── Full Pipeline (Debug + Release) ───────────────────────────────────
  android-full-pipeline:
    name: "Keyboard Masterpiece — Full Pipeline"
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      java: 17
      groups:
        - keyboard_signing
      vars:
        GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "keyboard-android-production"
          include: true
      cancel_previous_builds: true

    scripts:
      - name: Set up local properties
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make Gradle wrapper executable
        script: chmod +x ./gradlew

      - name: Run Lint checks
        script: |
          echo "🔍 Running lint..."
          ./gradlew lint --no-daemon 2>&1 | tail -20 || true

      - name: Build Debug APK
        script: |
          echo "🔨 Building Debug APK..."
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -30

      - name: Build Release APK
        script: |
          echo "🔨 Building Release APK..."
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tail -30

      - name: Verify builds
        script: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Build Results"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Debug APK
          DEBUG_APK="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$DEBUG_APK" ]; then
            echo "  ✅ Debug:   $(du -h "$DEBUG_APK" | cut -f1)"
          else
            echo "  ❌ Debug:   NOT FOUND"
          fi

          # Release APK
          RELEASE_APK="app/build/outputs/apk/release/app-release.apk"
          if [ -f "$RELEASE_APK" ]; then
            SIZE=$(du -h "$RELEASE_APK" | cut -f1)
            SIGNED=$([ -n "$CM_KEYSTORE_PATH" ] && echo "Signed ✓" || echo "Unsigned ✗")
            echo "  ✅ Release: $SIZE ($SIGNED)"
          else
            echo "  ❌ Release: NOT FOUND"
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    artifacts:
      - app/build/outputs/apk/debug/*.apk
      - app/build/outputs/apk/release/*.apk
      - app/build/outputs/mapping/release/**
      - app/build/reports/**

    publishing:
      email:
        recipients:
          - user@example.com   # ← Replace with your email
        notify:
          success: true
          failure: true
