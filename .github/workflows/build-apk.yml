name: Build APK

on:
  push:
    branches:
      - main
      - develop
      - keyboard-android-production
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-debug:
    name: Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install CMake and NDK
        run: |
          sdkmanager --install "cmake;3.22.1"
          sdkmanager --install "ndk;26.1.10909125"

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: List generated APK files
        if: always()
        run: |
          echo "APK files found:"
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          echo ""
          echo "Debug APK details:"
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug APK directory"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error

  build-release:
    name: Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install CMake and NDK
        run: |
          sdkmanager --install "cmake;3.22.1"
          sdkmanager --install "ndk;26.1.10909125"

      - name: Decode keystore from secrets
        id: decode_keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keyboard_masterpiece.jks
            echo "Keystore decoded successfully"
            ls -la app/keyboard_masterpiece.jks
            echo "has_keystore=true" >> $GITHUB_OUTPUT
          else
            echo "No keystore secret found - will build unsigned release"
            echo "has_keystore=false" >> $GITHUB_OUTPUT
          fi

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build Signed Release APK
        if: steps.decode_keystore.outputs.has_keystore == 'true'
        run: |
          echo "Building SIGNED release APK..."
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -PKEYSTORE_FILE=keyboard_masterpiece.jks \
            -PKEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
            -PKEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"

      - name: Build Unsigned Release APK
        if: steps.decode_keystore.outputs.has_keystore != 'true'
        run: |
          echo "No keystore configured - building UNSIGNED release APK..."
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Verify APK
        if: always()
        run: |
          echo "APK files found:"
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          echo ""
          echo "Release APK details:"
          ls -la app/build/outputs/apk/release/ 2>/dev/null || echo "No release APK directory"
          echo ""
          RELEASE_APK=$(find app/build/outputs/apk/release -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$RELEASE_APK" ]; then
            echo "Release APK: $RELEASE_APK"
            echo "Size: $(du -h "$RELEASE_APK" | cut -f1)"
            if command -v jarsigner &> /dev/null; then
              echo "Signing verification:"
              jarsigner -verify "$RELEASE_APK" 2>&1 || true
            fi
          else
            echo "WARNING: No release APK found!"
          fi

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload ProGuard Mapping
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-mapping
          path: app/build/outputs/mapping/release/**
          retention-days: 30
          if-no-files-found: warn
